advisor-upgrade-loop:
  nodes:
    - id: repo
      label: Git Repository
      sublabel: Maven / Gradle · Spring Boot app
      kind: client
      icon: git-branch
      position: { x: 40, y: 380 }
      width: 290
    - id: cli
      label: Application Advisor
      sublabel: cf repo plugin · advisor CLI
      kind: gateway
      icon: workflow
      position: { x: 560, y: 380 }
      width: 300
    - id: sbom
      label: Build Config (SBOM)
      sublabel: CycloneDX deps · JDK · build tool
      kind: data
      icon: database
      position: { x: 1180, y: 80 }
      width: 290
    - id: plan
      label: Upgrade Plan
      sublabel: ordered, incremental steps
      kind: service
      icon: layers
      position: { x: 1180, y: 380 }
      width: 290
    - id: recipes
      label: OpenRewrite Recipes
      sublabel: embedded in the CLI — air-gap ready
      kind: platform
      icon: sparkles
      position: { x: 1180, y: 700 }
      width: 300
    - id: hub
      label: Tanzu Hub
      sublabel: support status · vulnerabilities
      kind: observability
      icon: gauge
      position: { x: 1790, y: 80 }
      width: 300
    - id: advice
      label: Best-Practice Advice
      sublabel: spring-aot · spring-governance-starter
      kind: security
      icon: shield-check
      position: { x: 1790, y: 530 }
      width: 320
    - id: pr
      label: Pull Request
      sublabel: GitHub · GitLab · Bitbucket
      kind: external
      icon: globe
      position: { x: 1790, y: 700 }
      width: 300
  edges:
    - id: e-repo-cli
      source: repo
      target: cli
      label: analyzes repository
      animated: true
    - id: e-cli-sbom
      source: cli
      target: sbom
      label: build-sbom
    - id: e-sbom-plan
      source: sbom
      target: plan
      label: upgrade-plan
    - id: e-plan-recipes
      source: plan
      target: recipes
      label: apply-upgrade-plan
      animated: true
    - id: e-recipes-repo
      source: recipes
      target: repo
      label: commits changes
      dashed: true
      sourceSide: left
      targetSide: bottom
      waypoints:
        - { x: 185, y: 746 }
    - id: e-recipes-pr
      source: recipes
      target: pr
      label: --push --from-yml (CI/CD)
      dashed: true
    - id: e-sbom-hub
      source: sbom
      target: hub
      label: publish-sbom
      dashed: true
    - id: e-cli-advice
      source: cli
      target: advice
      label: advice / apply-advice
      dashed: true
      sourceSide: bottom
      targetSide: left
      waypoints:
        - { x: 710, y: 660 }
        - { x: 1790, y: 660 }
advisor-cicd-flow:
  nodes:
    - id: main-branch
      label: main branch
      sublabel: Git repository
      kind: client
      icon: git-branch
      position: { x: 40, y: 380 }
      width: 280
    - id: ci-job
      label: CI Job
      sublabel: GitHub Actions · GitLab · Jenkins
      kind: gateway
      icon: workflow
      position: { x: 460, y: 380 }
      width: 280
    - id: advisor-cli
      label: Application Advisor CLI
      sublabel: runs locally inside the CI job
      kind: service
      icon: terminal
      position: { x: 900, y: 380 }
      width: 300
    - id: artifact-mgr
      label: Artifact Manager
      sublabel: Nexus · Artifactory
      kind: data
      icon: boxes
      position: { x: 900, y: 700 }
      width: 300
    - id: pr-node
      label: Pull Request
      sublabel: proposed upgrade changes
      kind: external
      icon: globe
      position: { x: 1400, y: 380 }
      width: 280
    - id: review
      label: Review & Approve
      sublabel: human in the loop
      kind: security
      icon: shield-check
      position: { x: 1400, y: 700 }
      width: 280
  edges:
    - id: e-main-ci
      source: main-branch
      target: ci-job
      label: git push
      animated: true
    - id: e-ci-cli
      source: ci-job
      target: advisor-cli
      label: triggers
      animated: true
    - id: e-cli-artifact
      source: advisor-cli
      target: artifact-mgr
      label: resolves recipes
      dashed: true
    - id: e-cli-pr
      source: advisor-cli
      target: pr-node
      label: opens PR
      animated: true
    - id: e-pr-review
      source: pr-node
      target: review
      label: awaiting approval
      dashed: true
    - id: e-review-main
      source: review
      target: main-branch
      label: merge
      dashed: true
      sourceSide: top
      targetSide: bottom
      waypoints:
        - { x: 1540, y: 600 }
        - { x: 180, y: 600 }
