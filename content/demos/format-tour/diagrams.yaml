pipeline:
  groups:
    - id: app
      label: The App
      position: { x: 340, y: 40 }
      size: { width: 320, height: 200 }
  nodes:
    - id: markdown
      label: Markdown files
      sublabel: content/demos/<id>/
      kind: data
      icon: file-text
      position: { x: 40, y: 100 }
    - id: pipeline
      label: Content pipeline
      sublabel: parse + validate
